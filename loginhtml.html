<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근현대 신문사 호외요! 호외! - 로그인</title>
    
    <link rel="stylesheet" href="/NewsPaper/login/logincss.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <a href="/NewsPaper/firstpage/main.html">
                    <img src="/NewsPaper/image/로고2.png" alt="호외요 호외 로고">
                </a>
            </div>
            <nav>
                <a href="/NewsPaper/todaynews/TodayNews.html">오늘의 뉴스</a>
                <a href="/NewsPaper/search/search.html">옛기사 검색</a>
                <a href="/NewsPaper/historyman/Historyman.html">그때 그 인물</a>
                <a href="/NewsPaper/statistics/statistics.html">통계</a>
                <a href="/NewsPaper/login/loginhtml.html" class="login-btn">로그인</a>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <div class="login-wrapper">
            <h1>LOGIN SYSTEM</h1>
            
            <form id="loginForm">
                
                <div class="floating-group">
                    <input type="text" id="email" required placeholder=" ">
                    <label for="email">아이디 (ID)</label>
                </div>

                <div class="floating-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">비밀번호 (PASSWORD)</label>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="saveInfo">
                    <label for="saveInfo">로그인 정보 기억하기</label>
                </div>

                <button type="submit" class="btn-main-login">ACCESS LOGIN</button>
            </form>

            <div class="social-login">
                <button class="btn-social google">
                    <img src="/NewsPaper/image/구글로고.png" alt="G"> 구글로 시작하기
                </button>
                <button class="btn-social naver">
                    <img src="/NewsPaper/image/네이버로고.png" alt="N"> 네이버로 시작하기
                </button>
            </div>

            <div class="bottom-links">
                <a href="/NewsPaper/login/signup.html">회원가입</a>
                <span class="divider"></span>
                <a href="/NewsPaper/login/find_password_html.html">아이디/비밀번호 찾기</a>
            </div>
            
            <div id="statusMessage"></div>
        </div>
    </div>

    <script src="/NewsPaper/login/loginjs.js"></script>

</body>
</html>
