<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호외요! 호외!</title>
    
    <link rel="stylesheet" href="/NewsPaper/login/find_password_css.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <a href="/NewsPaper/firstpage/main.html">
                    <img src="/NewsPaper/images/로고2.png" alt="호외요 호외 로고">
                </a>
            </div>
            <nav>
                <a href="/NewsPaper/login/loginhtml.html" class="login-btn">로그인</a>
                <a href="/NewsPaper/login/signup.html" class="login-btn">회원가입</a>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <div class="find-wrapper">
            <h1>ACCOUNT RECOVERY</h1>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="openTab('findId')">아이디 찾기</button>
                <button class="tab-btn" onclick="openTab('findPw')">비밀번호 찾기</button>
            </div>

            <div id="findId" class="tab-content active">
                <p class="description">가입 시 등록한 <strong>이름</strong>과 <strong>전화번호</strong>를 입력하시오.</p>
                <form id="findIdForm">
                    <div class="floating-group">
                        <input type="text" id="userName" required placeholder=" ">
                        <label for="userName">이름 (NAME)</label>
                    </div>
                    <div class="floating-group">
                        <input type="text" id="userPhone" required placeholder=" ">
                        <label for="userPhone">전화번호 (PHONE)</label>
                    </div>
                    <button type="submit" class="btn-main-find">아이디 찾기</button>
                </form>
            </div>

            <div id="findPw" class="tab-content">
                <p class="description">가입한 <strong>아이디(이메일)</strong>를 입력하면 인증 코드를 보내드리리다.</p>
                <form id="findPwForm">
                    <div class="floating-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">아이디 (EMAIL)</label>
                    </div>
                    <button type="submit" class="btn-main-find">인증 코드 발송</button>
                </form>
            </div>

            <div class="bottom-links">
                <a href="/NewsPaper/login/loginhtml.html">로그인으로 돌아가기</a>
                <span class="divider"></span>
                <a href="/NewsPaper/login/signup.html">회원가입</a>
            </div>
            
            <div id="statusMessage"></div>
        </div>
    </div>

    <div id="codeModal" class="modal-overlay">
        <div class="modal-content">
            <h2>SECURITY CHECK</h2>
            <p>이메일로 전송된 6자리 코드를 입력하세요.</p>
            <div class="floating-group">
                <input type="text" id="verificationCode" required placeholder=" " maxlength="6">
                <label for="verificationCode">인증 코드 (CODE)</label>
            </div>
            <div class="modal-buttons">
                <button type="button" id="confirmCodeBtn" class="btn-modal-action">확인</button>
                <button type="button" id="closeModalBtn" class="btn-modal-close">취소</button>
            </div>
        </div>
    </div>

    <script src="/NewsPaper/login/find_password_js.js"></script>
</body>
</html>
