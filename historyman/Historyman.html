<head>

    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/NewsPaper/historyman/Historyman.css">
</head>
<body>

    <header id="fixed-header">
        <div class="header-logo">
            <a href="/NewsPaper/firstpage/index.html"><img src="/NewsPaper/image/로고2.png" alt="로고"></a>
        </div>
        <nav class="header-menu">

            <a href="/NewsPaper/historyman/Historyman.html" class="active-menu">그때 그 인물</a>
            <a href="/NewsPaper/statistics/statistics.html">통계</a>
            <a href="/NewsPaper/login/loginhtml.html" class="login-btn" id="loginLink">로그인</a>

    </header>


    <section id="intro-screen">
        <h2 class="intro-title">REMEMBER<span>HEROES</span></h2>
        
        <button class="intro-arrow left" onclick="rotateCards('left')">❮</button>
        <button class="intro-arrow right" onclick="rotateCards('right')">❯</button>

        <div class="hero-selection-container">
            <div class="hero-card center" onclick="enterProfile('yun')" data-id="yun">
                <img src="/NewsPaper/image/윤봉길 누끼2.png" alt="윤봉길">
                <div class="card-overlay">
                    <span class="role-badge">독립운동가</span>
                    <h3>윤봉길</h3>
                </div>
            </div>
            <div class="hero-card right-pos" onclick="enterProfile('lee')" data-id="lee">
                <img src="/NewsPaper/image/이봉창 누끼.png" alt="이봉창">
                <div class="card-overlay">
                    <span class="role-badge">독립운동가</span>
                    <h3>이봉창</h3>
                </div>
            </div>
            <div class="hero-card hidden" onclick="enterProfile('an')" data-id="an">
                <img src="/NewsPaper/image/안중근누끼.png" alt="안중근"> 
                <div class="card-overlay">
                    <span class="role-badge">참모중장</span>
                    <h3>안중근</h3>
                </div>
            </div>
            <div class="hero-card hidden" onclick="enterProfile('kim')" data-id="kim">
                <img src="/NewsPaper/image/김구누끼.png" alt="김구"> 
                <div class="card-overlay">
                    <span class="role-badge">임시정부 주석</span>
                    <h3>김 구</h3>
                </div>
            </div>
            <div class="hero-card hidden" onclick="enterProfile('ahn')" data-id="ahn">
                <img src="/NewsPaper/image/안창호누끼.png" alt="안창호"> 
                <div class="card-overlay">
                    <span class="role-badge">도산</span>
                    <h3>안창호</h3>
                </div>
            </div>
            <div class="hero-card hidden" onclick="enterProfile('sohn')" data-id="sohn">
                <img src="/NewsPaper/image/손기정누끼.png" alt="손기정"> 
                <div class="card-overlay">
                    <span class="role-badge">금메달리스트</span>
                    <h3>손기정</h3>
                </div>
            </div>
          
            <div class="hero-card left-pos" onclick="enterProfile('yu')" data-id="yu">
                <img src="/NewsPaper/image/유관순누끼.png" alt="유관순">
                <div class="card-overlay">
                    <span class="role-badge">독립운동가</span>
                    <h3>유관순</h3>
                </div>
            </div>
        </div>

        <div class="scroll-guide">보고 싶은 인물을 선택 해주세요</div>
    </section>


    <section id="section-profile">
        <div class="cinematic-bg" id="dynamic-bg"></div>
        <div class="cinematic-overlay"></div>

        <div class="cinematic-container">
            <div class="profile-left">
                <span class="profile-year" id="dynamic-year">1908 - 1932</span>
                <h1 class="profile-title" id="dynamic-name">윤 봉 길</h1>
                <p class="profile-desc" id="dynamic-desc">설명이 들어갑니다.</p>
                <button class="circle-btn" onclick="scrollToTimeline()"><span>▼</span></button>
            </div>

            <div class="profile-right">
                <div class="profile-video-box">
                    <video id="dynamic-video" class="profile-video" autoplay muted loop playsinline>
                        <source src="" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </section>

    <section id="section-timeline">
        <div class="timeline-header">
            <h2 id="dynamic-timeline-title">타임라인</h2>
            <p>스크롤을 내려 역사적 순간을 확인하세요.</p>
        </div>
        <div class="timeline-scroll-container" id="dynamic-timeline-area"></div>
    </section>

    <script src="/NewsPaper/firstpage/script.js"></script>
    <script src="/NewsPaper/historyman/history_data.js"></script>

    <script>
        // 타임라인 항목이 화면에 보일 때 네온 효과를 켜주는 함수
        function observeTimelineItems() {
            const items = document.querySelectorAll('.timeline-item');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // 항목이 화면의 50% 이상 보이면 'in-view' 클래스 추가
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                    } else {
                        // 위로 다시 스크롤할 때 불이 꺼지게 하려면 아래 줄 활성화 (현재 켜짐 유지)
                        entry.target.classList.remove('in-view'); 
                    }
                });
            }, { threshold: 0.5 }); // 50% 보일 때 작동

            items.forEach(item => observer.observe(item));
        }

        // history_data.js에서 데이터 렌더링이 끝난 후 이 함수를 호출해야 합니다.
        // 임시로 DOM 로드 시 실행하도록 설정
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(observeTimelineItems, 1000); // 렌더링 대기 후 옵저버 실행
        });
    </script>
</body>
</html>
