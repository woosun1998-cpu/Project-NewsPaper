<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근현대 신문사 - 오늘의 뉴스</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link
	href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
	rel="stylesheet">
<link rel="stylesheet" href="/NewsPaper/todaynews/TodayNews.css">
</head>
<body>

	<header id="fixed-header">
		<div class="header-logo">
			<a href="/NewsPaper/firstpage/index.html"><img
				src="/NewsPaper/image/로고2.png" alt="로고"></a>
		</div>
		<nav class="header-menu">
			<a href="/NewsPaper/todaynews/TodayNews.html" class="active-menu">오늘의
				뉴스</a> <a href="/NewsPaper/search/search.html">옛기사 검색</a> <a
				href="/NewsPaper/historyman/Historyman.html">그때 그 인물</a> 
				<a href="/NewsPaper/statistics/statistics.html">통계</a> 
				<a href="/NewsPaper/login/loginhtml.html" class="login-btn" id="loginLink">로그인</a>
		</nav>
	</header>

	<section id="fan-slider-section">
		<h2 class="bg-text">TOP HEADLINES</h2>
		<div class="fan-container"></div>
		<div class="slider-controls">
			<button class="nav-btn prev" onclick="changeSlide('prev')">❮</button>
			<button class="nav-btn next" onclick="changeSlide('next')">❯</button>
		</div>
	</section>

	<section id="news-detail-section">

		<div class="detail-container">
			<div class="detail-left">
				<div class="newspaper-frame" id="newspaper-frame">
					<a id="view-link" href="../newpageview/NewPaperView.html?id=610&from=today">

						<img id="detail-img" src="" alt="신문 기사">

						<div class="zoom-hint">
							<span class="icon">🔍</span> 클릭하여 자세히 보기
						</div>

					</a>
				</div>
			</div>

			<div class="detail-right">
				<div class="badge-row">
					<span class="detail-badge" id="detail-badge">호외</span> <span
						class="detail-date" id="detail-date">1900.00.00</span>
				</div>
				<h1 class="detail-title" id="detail-title">제목</h1>
				<div class="gold-divider"></div>
				<p class="detail-desc" id="detail-desc">내용</p>
			</div>
		</div>
		<div class="comment-wrapper">
			<div class="comment-section">
				<div class="gold-divider"
					style="margin: 0 0 30px 0; opacity: 0.3; width: 100%;"></div>

				<h3 class="comment-title">ARCHIVIST OPINIONS</h3>

				<div id="comment-list-area" class="comment-list"></div>

				<div class="comment-form">
					<input type="text" id="comment-input"
						placeholder="이 역사의 순간에 대한 기록을 남기세요...">
					<button onclick="addComment()" class="comment-btn">등록</button>
				</div>
			</div>
		</div>

	</section>

	<script src="/NewsPaper/todaynews/news_slider.js"></script>
	<script src="/NewsPaper/firstpage/script.js"></script>
</body>
</html>
